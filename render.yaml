services:
  - type: web
    name: localhub
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && cd frontend && npm ci && npm run build
    startCommand: cd backend && python run_server.py
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: NODE_VERSION
        value: 22.22.0
      - key: OPENAI_API_KEY
        sync: false
