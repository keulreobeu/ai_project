<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Seoul Chatbot Test Page</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f4f7fb;
        --card: #ffffff;
        --border: #dfe7f3;
        --primary: #2563eb;
        --primary-soft: #dbeafe;
        --text: #14213d;
        --muted: #667085;
        --success: #0f766e;
      }

      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Segoe UI", Arial, sans-serif;
        background: linear-gradient(135deg, #eff6ff 0%, var(--bg) 100%);
        color: var(--text);
      }

      .page {
        max-width: 1100px;
        margin: 0 auto;
        padding: 24px;
      }

      .hero {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 24px;
        padding: 24px;
        box-shadow: 0 10px 30px rgba(37, 99, 235, 0.08);
        margin-bottom: 20px;
      }

      .hero h1 {
        margin: 0 0 8px;
        font-size: 28px;
      }

      .hero p {
        margin: 0;
        color: var(--muted);
        line-height: 1.6;
      }

      .grid {
        display: grid;
        grid-template-columns: 1fr 1.1fr;
        gap: 20px;
      }

      .panel {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 20px;
        box-shadow: 0 8px 24px rgba(20, 33, 61, 0.06);
      }

      .panel h2 {
        margin-top: 0;
        font-size: 18px;
      }

      .field { margin-bottom: 12px; }
      .field label { display: block; font-size: 13px; margin-bottom: 6px; color: var(--muted); }
      .field input,
      .field select,
      .field textarea {
        width: 100%;
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 10px 12px;
        font-size: 14px;
        outline: none;
      }

      .field textarea { min-height: 92px; resize: vertical; }

      .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

      .chip-row { display: flex; flex-wrap: wrap; gap: 8px; margin: 10px 0 16px; }
      .chip {
        border: 1px solid var(--primary-soft);
        background: #f8fbff;
        color: var(--primary);
        border-radius: 999px;
        padding: 7px 12px;
        cursor: pointer;
        font-size: 13px;
      }

      button {
        border: none;
        border-radius: 999px;
        padding: 10px 16px;
        background: var(--primary);
        color: white;
        cursor: pointer;
        font-weight: 600;
      }

      button:disabled { opacity: 0.65; cursor: wait; }

      .chat-box {
        min-height: 360px;
        max-height: 480px;
        overflow-y: auto;
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 12px;
        background: #fcfdff;
      }

      .bubble {
        padding: 10px 12px;
        border-radius: 14px;
        margin-bottom: 10px;
        white-space: pre-wrap;
        line-height: 1.5;
      }

      .bubble.user { background: var(--primary-soft); margin-left: 20px; }
      .bubble.bot { background: #f3f4f6; margin-right: 20px; }
      .bubble.small { font-size: 13px; color: var(--muted); }

      .source-list { margin-top: 10px; padding: 0; list-style: none; }
      .source-list li { padding: 8px 0; border-bottom: 1px solid #eef2f7; }
      .source-list strong { display: block; margin-bottom: 2px; }

      .status { margin-top: 10px; color: var(--success); font-size: 13px; }
      .status.error { color: #b91c1c; }

      @media (max-width: 860px) {
        .grid { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <section class="hero">
        <h1>챗봇 기능 테스트 페이지</h1>
        <p>질문을 입력하고 위치 정보, 페르소나를 함께 보내면 백엔드 챗봇 응답과 추천 소스를 바로 확인할 수 있습니다.</p>
      </section>

      <div class="grid">
        <section class="panel">
          <h2>질문 입력</h2>
          <div class="chip-row">
            <button class="chip" type="button" data-question="강남역 근처에서 지금 하는 행사나 공연 추천해줘">강남역 근처</button>
            <button class="chip" type="button" data-question="연인과 가기 좋은 서울 야간 데이트 코스 추천해줘">연인 데이트</button>
            <button class="chip" type="button" data-question="아이와 함께 가기 좋은 실내 여행지 추천해줘">아이와 함께</button>
          </div>

          <div class="field">
            <label for="question">질문</label>
            <textarea id="question" placeholder="예: 강남역 근처에서 지금 하는 행사나 공연 추천해줘"></textarea>
          </div>

          <div class="row">
            <div class="field">
              <label for="lat">위도</label>
              <input id="lat" type="text" value="37.4979" />
            </div>
            <div class="field">
              <label for="lon">경도</label>
              <input id="lon" type="text" value="127.0276" />
            </div>
          </div>

          <div class="row">
            <div class="field">
              <label for="locationName">위치 이름</label>
              <input id="locationName" type="text" placeholder="강남역" />
            </div>
            <div class="field">
              <label for="persona">페르소나</label>
              <select id="persona">
                <option value="">선택 안 함</option>
                <option value="연인">연인</option>
                <option value="아이와 함께">아이와 함께</option>
                <option value="혼자">혼자</option>
              </select>
            </div>
          </div>

          <button id="sendBtn" type="button">질문 보내기</button>
          <div id="status" class="status">백엔드가 준비되면 응답을 확인할 수 있습니다.</div>
        </section>

        <section class="panel">
          <h2>대화 결과</h2>
          <div id="chatBox" class="chat-box">
            <div class="bubble bot">안녕하세요. 서울 챗봇 테스트를 시작해보세요.</div>
          </div>
        </section>
      </div>
    </div>

    <script>
      const questionInput = document.getElementById('question');
      const latInput = document.getElementById('lat');
      const lonInput = document.getElementById('lon');
      const locationNameInput = document.getElementById('locationName');
      const personaInput = document.getElementById('persona');
      const sendBtn = document.getElementById('sendBtn');
      const chatBox = document.getElementById('chatBox');
      const status = document.getElementById('status');

      document.querySelectorAll('.chip').forEach((chip) => {
        chip.addEventListener('click', () => {
          questionInput.value = chip.dataset.question;
          questionInput.focus();
        });
      });

      function appendMessage(role, text) {
        const bubble = document.createElement('div');
        bubble.className = `bubble ${role}`;
        bubble.textContent = text;
        chatBox.appendChild(bubble);
        chatBox.scrollTop = chatBox.scrollHeight;
      }

      function renderSources(sources) {
        if (!sources || sources.length === 0) return;
        const list = document.createElement('ul');
        list.className = 'source-list';
        sources.forEach((item) => {
          const li = document.createElement('li');
          li.innerHTML = `<strong>${item.title || '이름 없음'}</strong><div>${item.display_address || item.address || '주소 정보 없음'}</div>`;
          list.appendChild(li);
        });
        chatBox.appendChild(list);
        chatBox.scrollTop = chatBox.scrollHeight;
      }

      async function sendMessage() {
        const question = questionInput.value.trim();
        if (!question) {
          status.textContent = '질문을 입력해주세요.';
          status.className = 'status error';
          return;
        }

        appendMessage('user', question);
        sendBtn.disabled = true;
        status.textContent = '응답을 기다리는 중입니다...';
        status.className = 'status';

        try {
          const payload = {
            question,
            lat: latInput.value ? parseFloat(latInput.value) : null,
            lon: lonInput.value ? parseFloat(lonInput.value) : null,
            location_name: locationNameInput.value || null,
            persona: personaInput.value || null,
          };

          const response = await fetch('/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload),
          });

          const data = await response.json();
          if (!response.ok) {
            throw new Error(data.detail || '응답 처리 중 문제가 발생했습니다.');
          }

          appendMessage('bot', data.answer || '응답이 없습니다.');
          if (data.sources && data.sources.length > 0) {
            const hint = document.createElement('div');
            hint.className = 'bubble bot small';
            hint.textContent = '추천 소스';
            chatBox.appendChild(hint);
            renderSources(data.sources);
          }
          status.textContent = '응답 완료';
          status.className = 'status';
        } catch (error) {
          status.textContent = error.message;
          status.className = 'status error';
          appendMessage('bot', `오류: ${error.message}`);
        } finally {
          sendBtn.disabled = false;
        }
      }

      sendBtn.addEventListener('click', sendMessage);
      questionInput.addEventListener('keydown', (event) => {
        if (event.key === 'Enter' && !event.shiftKey) {
          event.preventDefault();
          sendMessage();
        }
      });
    </script>
  </body>
</html>
